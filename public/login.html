<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Sign in · Stockroom</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@500;600&family=IBM+Plex+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/style.css" />
</head>
<body>
  <div class="login-shell">
    <div class="login-card">
      <div class="login-brand">Stockroom</div>
      <h1 class="login-title">Sign in to your inventory</h1>

      <div id="loginError" class="form-error" style="display:none;"></div>

      <form id="loginForm">
        <div class="field">
          <label for="username">Username</label>
          <input id="username" name="username" autocomplete="username" autofocus required />
        </div>
        <div class="field">
          <label for="password">Password</label>
          <input id="password" name="password" type="password" autocomplete="current-password" required />
        </div>
        <button type="submit" class="btn btn-primary" style="width:100%; justify-content:center;">Sign in</button>
      </form>

      <div class="login-footnote">First time here? Default login is admin / admin123 — change it after signing in.</div>
    </div>
  </div>

  <script src="js/login.js"></script>
</body>
</html>
